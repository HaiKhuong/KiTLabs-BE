version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: kitools-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kitools
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  postgres_audit:
    image: postgres:16
    container_name: kitools-postgres-audit
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kitools_audit
    ports:
      - "5433:5432"
    volumes:
      - pg_audit_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: kitools-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ytdlp:
    build: ./tools/yt-dlp-service
    container_name: kitools-ytdlp
    restart: unless-stopped
    ports:
      - "8100:8000"
    volumes:
      - ytdlp_temp:/tmp/ytdlp
    environment:
      - MAX_CONCURRENT_DOWNLOADS=3

  douyin-playwright:
    build: ./tools/douyin-playwright-service
    container_name: kitools-douyin-playwright
    restart: unless-stopped
    ports:
      - "8101:8000"
    environment:
      - PORT=8000
    shm_size: "1gb"
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  pg_data:
  pg_audit_data:
  redis_data:
  ytdlp_temp:
