version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: kitools-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kitools
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  postgres_audit:
    image: postgres:16
    container_name: kitools-postgres-audit
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kitools_audit
    ports:
      - "5433:5432"
    volumes:
      - pg_audit_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: kitools-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  pg_audit_data:
  redis_data:
